<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    if (localStorage.getItem('rtl') === 'true') {
      document.documentElement.setAttribute('dir', 'rtl');
    }
  </script>
  <title>Register - EV Fleet</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            darkbg: '#0B0F19',
            cardbg1: '#111827',
            cardbg2: '#1F2937',
            primary: '#10B981',
            secondary: '#06B6D4',
            accent: '#F59E0B',
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            heading: ['Space Grotesk', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/custom.css">
  <style>
    .neon-focus:focus {
      border-color: #06B6D4;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
    }
  </style>
</head>
<body class="bg-[#0B0F19] text-[#F3F4F6] min-h-screen flex items-center justify-center relative overflow-hidden pt-20 pb-8 md:py-8">

  <!-- Floating Toggles (Top Right) -->
  <div class="absolute top-4 right-4 z-50 flex gap-2">
    <button id="rtl-toggle" class="w-9 h-9 flex items-center justify-center rounded-full border border-gray-800 hover:bg-gray-800 bg-[#0B0F19]/60 backdrop-blur text-[#F3F4F6] transition-all" title="Toggle RTL">
      <i id="rtl-icon" class="fa-solid fa-right-left text-sm text-gray-300"></i>
    </button>
    <button id="theme-toggle" class="w-9 h-9 flex items-center justify-center rounded-full border border-gray-800 hover:bg-gray-800 bg-[#0B0F19]/60 backdrop-blur text-[#F3F4F6] transition-all" title="Toggle Theme">
      <i id="theme-icon" class="fa-regular fa-sun text-[#F59E0B] text-sm"></i>
    </button>
  </div>

  <!-- Background Orbs -->
  <div class="bg-gradient-orb orb-primary -top-12 -left-12"></div>
  <div class="bg-gradient-orb orb-secondary -bottom-12 -right-12"></div>

  <!-- Glass Form Container -->
  <main class="w-full max-w-md px-6 relative z-10 my-8">
    <div class="glass-panel auth-card p-8 rounded-3xl space-y-6">
      
      <!-- Logo Header -->
      <div class="text-center space-y-2">
        <a class="brand-logo flex items-center justify-center gap-2 tracking-wider" href="index.html">
          <i class="fa-solid fa-bolt-lightning text-[#06B6D4]"></i>
          <span>EV <span class="brand-green">FLEET</span></span>
        </a>
        <p class="text-xs text-[#9CA3AF]">Create your fleet manager account</p>
      </div>

      <!-- Form -->
      <form class="space-y-4" onsubmit="validatePasswords(event)">
        <div>
          <label class="block text-[10px] uppercase tracking-widest text-[#9CA3AF] mb-1">Full Name</label>
          <input type="text" required class="w-full px-4 py-2.5 rounded-xl bg-[#0B0F19]/60 border border-gray-800 text-white text-xs placeholder-gray-600 focus:outline-none neon-focus transition-all">
        </div>
        <div>
          <label class="block text-[10px] uppercase tracking-widest text-[#9CA3AF] mb-1">Email address</label>
          <input type="email" required autocomplete="email" class="w-full px-4 py-2.5 rounded-xl bg-[#0B0F19]/60 border border-gray-800 text-white text-xs placeholder-gray-600 focus:outline-none neon-focus transition-all">
        </div>
        <div>
          <label class="block text-[10px] uppercase tracking-widest text-[#9CA3AF] mb-1">Password</label>
          <div class="relative">
            <input id="reg-password" type="password" required autocomplete="new-password" class="w-full px-4 py-2.5 rounded-xl bg-[#0B0F19]/60 border border-gray-800 text-white text-xs placeholder-gray-600 focus:outline-none neon-focus transition-all pr-10">
            <button type="button" onclick="toggleRegPasswordVisibility('reg-password', 'reg-password-eye')" class="password-toggle-btn absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors text-xs">
              <i id="reg-password-eye" class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-[10px] uppercase tracking-widest text-[#9CA3AF] mb-1">Confirm Password</label>
          <div class="relative">
            <input id="reg-confirm-password" type="password" required autocomplete="new-password" class="w-full px-4 py-2.5 rounded-xl bg-[#0B0F19]/60 border border-gray-800 text-white text-xs placeholder-gray-600 focus:outline-none neon-focus transition-all pr-10">
            <button type="button" onclick="toggleRegPasswordVisibility('reg-confirm-password', 'reg-confirm-password-eye')" class="password-toggle-btn absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors text-xs">
              <i id="reg-confirm-password-eye" class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>
 
        <div class="auth-terms-container flex items-start gap-2.5 text-[10px] text-[#9CA3AF] leading-relaxed">
          <input type="checkbox" required id="terms-checkbox" class="mt-0.5 rounded bg-[#0B0F19] border-gray-800 text-[#10B981] focus:ring-0 cursor-pointer">
          <label for="terms-checkbox" class="cursor-pointer select-none">
             <a href="#" class="text-[#06B6D4] hover:underline">I agree to the Grid Services Agreement</a> and <a href="#" class="text-[#06B6D4] hover:underline">Terms of Service</a>.
          </label>
        </div>
 
        <button type="submit" class="w-full py-3 rounded-xl bg-[#10B981] hover:bg-[#10B981]/90 transition-all font-medium text-xs uppercase tracking-wider">
          Create Account
        </button>
      </form>
 
      <!-- Social Logins -->
      <div class="space-y-4">
        <div class="flex items-center gap-2">
          <div class="h-[1px] bg-gray-800 flex-1"></div>
          <span class="text-[9px] uppercase tracking-widest text-gray-600">Or sign up with</span>
          <div class="h-[1px] bg-gray-800 flex-1"></div>
        </div>
 
        <div class="grid grid-cols-2 gap-4">
          <button onclick="location.href='dashboard.html';" class="social-login-btn google-btn py-2.5 rounded-xl border border-gray-800 hover:border-gray-650 transition-colors flex items-center justify-center gap-2 text-xs">
            <i class="fa-brands fa-google text-red-500"></i> Google
          </button>
          <button onclick="location.href='dashboard.html';" class="social-login-btn apple-btn py-2.5 rounded-xl border border-gray-800 hover:border-gray-650 transition-colors flex items-center justify-center gap-2 text-xs">
            <i class="fa-brands fa-apple text-white"></i> Apple
          </button>
        </div>
      </div>
 
      <!-- Login link -->
      <div class="text-center text-xs text-[#9CA3AF] pt-2">
        Already have an account? <a href="login.html" class="text-[#06B6D4] hover:underline">Log in here</a>
      </div>
 
    </div>
  </main>
 
  <script>
    function toggleRegPasswordVisibility(inputId, eyeId) {
      const input = document.getElementById(inputId);
      const eye = document.getElementById(eyeId);
      if (input.type === 'password') {
        input.type = 'text';
        eye.className = 'fa-regular fa-eye-slash';
      } else {
        input.type = 'password';
        eye.className = 'fa-regular fa-eye';
      }
    }

    function validatePasswords(event) {
      event.preventDefault();
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('reg-confirm-password').value;
 
      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return false;
      }
      location.href = 'dashboard.html';
      return true;
    }
  </script>
  <script src="js/main.js"></script>
</body>
</html>
