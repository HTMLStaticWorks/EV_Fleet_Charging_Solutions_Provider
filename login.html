<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    if (localStorage.getItem('rtl') === 'true') {
      document.documentElement.setAttribute('dir', 'rtl');
    }
  </script>
  <title>Login - EV Fleet</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            darkbg: '#0B0F19',
            cardbg1: '#111827',
            cardbg2: '#1F2937',
            primary: '#10B981',
            secondary: '#06B6D4',
            accent: '#F59E0B',
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            heading: ['Space Grotesk', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/custom.css">
  <style>
    .neon-focus:focus {
      border-color: #06B6D4;
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
    }
  </style>
</head>
<body class="bg-[#0B0F19] text-[#F3F4F6] min-h-screen flex items-center justify-center relative overflow-hidden pt-20 pb-8 md:py-8">

  <!-- Floating Toggles (Top Right) -->
  <div class="absolute top-4 right-4 z-50 flex gap-2">
    <button id="rtl-toggle" class="w-9 h-9 flex items-center justify-center rounded-full border border-gray-800 hover:bg-gray-800 bg-[#0B0F19]/60 backdrop-blur text-[#F3F4F6] transition-all" title="Toggle RTL">
      <i id="rtl-icon" class="fa-solid fa-right-left text-sm text-gray-300"></i>
    </button>
    <button id="theme-toggle" class="w-9 h-9 flex items-center justify-center rounded-full border border-gray-800 hover:bg-gray-800 bg-[#0B0F19]/60 backdrop-blur text-[#F3F4F6] transition-all" title="Toggle Theme">
      <i id="theme-icon" class="fa-regular fa-sun text-[#F59E0B] text-sm"></i>
    </button>
  </div>

  <!-- Background Orbs -->
  <div class="bg-gradient-orb orb-primary -top-12 -left-12"></div>
  <div class="bg-gradient-orb orb-secondary -bottom-12 -right-12"></div>

  <!-- Glass Form Container -->
  <main class="w-full max-w-md px-6 relative z-10">
    <div class="glass-panel auth-card p-8 rounded-3xl space-y-6">
      
      <!-- Logo Header -->
      <div class="text-center space-y-2">
        <a class="flex items-center justify-center gap-2 text-[#F3F4F6] text-2xl tracking-wider font-heading" href="index.html">
          <i class="fa-solid fa-bolt-lightning text-[#06B6D4]"></i>
          <span>EV <span class="text-[#10B981] font-medium">FLEET</span></span>
        </a>
        <p class="text-xs text-[#9CA3AF]">Access your fleet manager portal</p>
      </div>

      <!-- Form -->
      <form class="space-y-4" onsubmit="event.preventDefault(); location.href='dashboard.html';">
        <div>
          <label class="block text-[10px] uppercase tracking-widest text-[#9CA3AF] mb-1">Email address</label>
          <input type="email" required autocomplete="off" class="w-full px-4 py-2.5 rounded-xl bg-[#0B0F19]/60 border border-gray-800 text-white text-xs placeholder-gray-600 focus:outline-none neon-focus transition-all">
        </div>
        <div class="relative">
          <label class="block text-[10px] uppercase tracking-widest text-[#9CA3AF] mb-1">Password</label>
          <div class="relative">
            <input id="password-input" type="password" required autocomplete="off" class="w-full px-4 py-2.5 rounded-xl bg-[#0B0F19]/60 border border-gray-800 text-white text-xs placeholder-gray-600 focus:outline-none neon-focus transition-all pr-10">
            <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors text-xs">
              <i id="password-eye" class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="flex justify-between items-center text-[11px] text-[#9CA3AF]">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="rounded bg-[#0B0F19] border-gray-800 text-[#10B981] focus:ring-0">
            <span>Remember me</span>
          </label>
          <a href="#" class="hover:text-white transition-colors">Forgot password?</a>
        </div>

        <button type="submit" class="w-full py-3 rounded-xl bg-[#10B981] hover:bg-[#10B981]/90 transition-all font-medium text-xs uppercase tracking-wider">
          Log In
        </button>
      </form>

      <!-- Social Logins -->
      <div class="space-y-4">
        <div class="flex items-center gap-2">
          <div class="h-[1px] bg-gray-800 flex-1"></div>
          <span class="text-[9px] uppercase tracking-widest text-gray-600">Or connect with</span>
          <div class="h-[1px] bg-gray-800 flex-1"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <button onclick="location.href='dashboard.html';" class="social-login-btn google-btn py-2.5 rounded-xl border border-gray-800 hover:border-gray-650 transition-colors flex items-center justify-center gap-2 text-xs">
            <i class="fa-brands fa-google text-red-500"></i> Google
          </button>
          <button onclick="location.href='dashboard.html';" class="social-login-btn apple-btn py-2.5 rounded-xl border border-gray-800 hover:border-gray-650 transition-colors flex items-center justify-center gap-2 text-xs">
            <i class="fa-brands fa-apple text-white"></i> Apple
          </button>
        </div>
      </div>

      <!-- Registration link -->
      <div class="text-center text-xs text-[#9CA3AF] pt-2">
        Don't have an account? <a href="register.html" class="text-[#06B6D4] hover:underline">Register here</a>
      </div>

    </div>
  </main>

  <script>
    function togglePasswordVisibility() {
      const input = document.getElementById('password-input');
      const eye = document.getElementById('password-eye');
      if (input.type === 'password') {
        input.type = 'text';
        eye.className = 'fa-regular fa-eye-slash';
      } else {
        input.type = 'password';
        eye.className = 'fa-regular fa-eye';
      }
    }
  </script>
  <script src="js/main.js"></script>
</body>
</html>
